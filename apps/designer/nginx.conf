server {
  listen       80;
  server_name  _;
  root         /usr/share/nginx/html;
  index        index.html;

  # SPA fallback — anything not matching a real file falls through to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache for hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}