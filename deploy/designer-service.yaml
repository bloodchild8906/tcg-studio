apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tcg-designer
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    spec:
      containerConcurrency: 80
      containers:
      - image: "${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/designer:${TAG}"
        ports:
        - name: http1
          containerPort: 80
        env:
        - name: VITE_API_URL
          value: "${API_URL}"
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
