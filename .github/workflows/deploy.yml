name: Deploy to GCE VM

# Triggered on push to main. Manual dispatch is also available for retries
# without having to push an empty commit.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Single in-flight deploy at a time — back-to-back pushes serialize.
# `cancel-in-progress: false` because docker compose builds aren't
# safe to cancel mid-write (leaves the api container in a bad state).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

# GITHUB_TOKEN needs explicit grants for the post-deploy steps:
#   contents: write — push to the wiki repo (it's a peer git repo)
#   issues:   write — open / update / comment the build status issue
# Everything else stays at the default `read`.
permissions:
  contents: write
  issues: write

jobs:
  deploy:
    name: rsync + docker compose up
    runs-on: ubuntu-latest

    # All deploy logic in one job so we can fail fast and have a single
    # log stream to read. The job runs in ~3-5 min when the cache is warm.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH key
        # The deploy key is stored as a GitHub secret (SSH_PRIVATE_KEY).
        # We write it to a file, chmod 600, and configure ssh to use it
        # without an interactive known_hosts prompt — `StrictHostKeyChecking`
        # is set to `accept-new` so first-time fingerprints are auto-accepted
        # but a subsequent change (potential MITM) still fails the job.
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_ed25519
          chmod 600 ~/.ssh/deploy_ed25519
          cat >> ~/.ssh/config <<EOF
          Host gce
            HostName ${{ secrets.VM_HOST }}
            User ${{ secrets.VM_USER }}
            IdentityFile ~/.ssh/deploy_ed25519
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF

      - name: Rsync sources to VM
        # Push everything except node_modules / .git / build artifacts.
        # The VM rebuilds inside docker, so we never want to copy host
        # node_modules — they'd shadow the container's prisma binary
        # and break startup.
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.tsbuildinfo' \
            --exclude='_legacy' \
            --exclude='deploy/.env*' \
            --exclude='deploy/.secrets.local' \
            --exclude='*.log' \
            ./ gce:/home/${{ secrets.VM_USER }}/tcgstudio/

      - name: Run prisma migrate deploy
        # If the API container is up the prisma binary is already inside
        # it; just exec. If the API isn't up (first-ever deploy) the next
        # step's `up -d` will bring it up and we can run migrate after.
        run: |
          ssh gce '
            set -e
            cd ~/tcgstudio
            if sudo docker compose -f deploy/docker-compose.prod.yml ps api --status running 2>/dev/null | grep -q api; then
              sudo docker compose -f deploy/docker-compose.prod.yml exec -T api npx prisma migrate deploy
            else
              echo "api not running yet — migrations will run after first up"
            fi
          '

      - name: Build and start services
        # docker compose build picks up only the layers that changed
        # thanks to the buildkit cache on disk. --remove-orphans cleans
        # any services that were removed from compose.
        run: |
          ssh gce '
            set -e
            cd ~/tcgstudio
            sudo docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env build
            sudo docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --remove-orphans
            # First-deploy fallback: if migrate hasnt run because the api
            # wasnt up earlier, run it now.
            sudo docker compose -f deploy/docker-compose.prod.yml exec -T api npx prisma migrate deploy
            sudo docker compose -f deploy/docker-compose.prod.yml ps
          '

      - name: Purge Cloudflare cache
        # Bust the CDN so visitors see the new bundle immediately. The
        # SPA bundle filename is hashed so this isn't strictly required,
        # but the index.html references the hash by name and CF caches
        # the index too. `continue-on-error: true` because we don't want
        # a stale token (or missing secrets) to turn a successful deploy
        # red — the deploy worked; the cache just wasn't busted.
        continue-on-error: true
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_TOKEN" ]; then
            echo "no CF secrets configured — skipping cache purge"
            exit 0
          fi
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Smoke test
        id: smoke
        # Hit /healthz two ways and accept either:
        #
        #   (1) the public host via Cloudflare. This is the "real"
        #       customer path but CF occasionally returns a 403 during
        #       the smoke window — under-attack-mode kicks in, the cache
        #       lags behind a fresh deploy, etc. We don't want a CF blip
        #       to fail a healthy deploy.
        #
        #   (2) the VM directly by IP, faking the public host via the
        #       Host header. This proves the docker stack is up and the
        #       app is serving 200s. CF can't impact this path because
        #       we skip CF entirely.
        #
        # As long as EITHER path returns 200 we count the deploy as
        # healthy. We also widen the retry window to 60s total (12 ×
        # 5s) so a slow container start (prisma migrate, redis warm-up)
        # has time to land.
        #
        # We DON'T exit the job here — the wiki + issue update steps
        # need to run regardless, and the final gate step decides the
        # job's red/green status.
        env:
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST || 'tcgstudio.online' }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          probe_public() {
            curl -fsS --max-time 8 "https://$PUBLIC_HOST/healthz" 2>/dev/null
          }
          probe_direct() {
            # -k because the VM presents Cloudflare's edge cert from
            # nginx — we don't actually need TLS validation here since
            # we're proving the app responds. Skip if VM_HOST isn't
            # set (we always set it via the SSH key step earlier, but
            # belt-and-suspenders).
            [ -z "$VM_HOST" ] && return 1
            curl -fsS --max-time 8 -k -H "Host: $PUBLIC_HOST" "http://$VM_HOST/healthz" 2>/dev/null
          }

          for i in $(seq 1 12); do
            if PUB=$(probe_public); then
              echo "deploy healthy via public host: $PUB"
              echo "result=healthy" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if DIR=$(probe_direct); then
              echo "deploy healthy via VM direct (CF transient ignored): $DIR"
              echo "result=healthy" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "attempt $i/12: both probes failed, retrying in 5s"
            sleep 5
          done
          echo "smoke test failed — neither public nor direct probe reached /healthz"
          echo "result=failed" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Post-deploy bookkeeping: wiki + GitHub issues. These run even
      # if the smoke test failed so the wiki + the build-status issue
      # accurately reflect a bad deploy (status: failed).
      # ----------------------------------------------------------------

      - name: Update wiki
        # The wiki is its own git repo at <repo>.wiki.git. GITHUB_TOKEN
        # has access because `contents: write` is granted at the
        # workflow level. We write two pages:
        #
        #   Home.md         — landing page, lists last 10 deploys
        #   Build-Status.md — one-page summary of the latest run
        #
        # The deploy-log table is regenerated each run from the
        # existing rows + the new row, so the wiki accumulates a
        # rolling deploy history without us needing to keep state
        # elsewhere.
        #
        # `continue-on-error` because the wiki has to be initialised
        # manually once (visit the repo's Wiki tab → "Create the
        # first page") before clone/push will work. We don't want a
        # missing wiki to fail the whole deploy.
        if: always()
        continue-on-error: true
        env:
          DEPLOY_RESULT: ${{ steps.smoke.outputs.result || 'unknown' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST || 'tcgstudio.online' }}
        run: |
          set -e
          WIKI_REPO="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          # First-time bootstrap: if the wiki has never been cloned the
          # remote repo doesn't exist yet (404). Initialise locally and
          # push to create it.
          WIKI_DIR="$RUNNER_TEMP/wiki"
          rm -rf "$WIKI_DIR"
          if git clone --depth=1 "$WIKI_REPO" "$WIKI_DIR" 2>/dev/null; then
            echo "cloned existing wiki"
          else
            echo "no wiki yet — bootstrapping"
            mkdir -p "$WIKI_DIR"
            cd "$WIKI_DIR"
            git init -b master
            git remote add origin "$WIKI_REPO"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
          fi
          cd "$WIKI_DIR"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          NOW="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          SHA_SHORT="$(echo '${{ github.sha }}' | cut -c1-7)"
          ROW="| $NOW | [\`$SHA_SHORT\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) | $DEPLOY_RESULT | [run]($RUN_URL) |"

          # Build-Status.md — single-snapshot of the latest deploy.
          cat > Build-Status.md <<EOF
          # Build status

          Latest deploy of [\`${{ github.repository }}\`](${{ github.server_url }}/${{ github.repository }}).

          | Field        | Value |
          | ------------ | ----- |
          | Status       | **$DEPLOY_RESULT** |
          | Commit       | [\`$SHA_SHORT\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |
          | Workflow run | [#${{ github.run_number }}]($RUN_URL) |
          | Triggered by | @${{ github.actor }} |
          | Public host  | https://$PUBLIC_HOST |
          | Deployed at  | $NOW |

          [Live site]( https://$PUBLIC_HOST ) ·
          [Healthz]( https://$PUBLIC_HOST/healthz ) ·
          [Run logs]( $RUN_URL )

          ## Recent deploys

          See **[Home](Home)** for the rolling deploy history.
          EOF

          # Home.md — keep the deploy log, prepend the new row.
          OLD_LOG=""
          if [ -f Home.md ] && grep -q '^<!--BEGIN_DEPLOY_LOG-->' Home.md; then
            OLD_LOG=$(awk '/^<!--BEGIN_DEPLOY_LOG-->/,/^<!--END_DEPLOY_LOG-->/' Home.md | sed '/^<!--BEGIN_DEPLOY_LOG-->/d;/^<!--END_DEPLOY_LOG-->/d')
          fi
          # Drop the header rows so we can re-emit them once; trim to
          # 30 deploys so the page stays readable.
          OLD_ROWS=$(echo "$OLD_LOG" | grep -E '^\| [0-9]{4}-' | head -29 || true)

          cat > Home.md <<EOF
          # TCGStudio

          Build the game. Publish the world. Own the brand.

          * [Live site](https://$PUBLIC_HOST)
          * [Repository](${{ github.server_url }}/${{ github.repository }})
          * [Build status](Build-Status) (last: **$DEPLOY_RESULT** @ $NOW)
          * [Open issues](${{ github.server_url }}/${{ github.repository }}/issues)

          ## Deploy log

          <!--BEGIN_DEPLOY_LOG-->
          | When | Commit | Result | Run |
          | ---- | ------ | ------ | --- |
          $ROW
          $OLD_ROWS
          <!--END_DEPLOY_LOG-->
          EOF

          git add Home.md Build-Status.md
          # `commit -m … || true` so a no-op (nothing changed) doesn't
          # fail the workflow step. Possible on a re-run with the same
          # SHA + same minute.
          git commit -m "deploy: ${{ github.sha }} ($DEPLOY_RESULT)" || echo "wiki unchanged"
          git push origin HEAD:master

      - name: Update build-status issue
        # Maintain a single "Build status" GitHub issue: title is fixed,
        # body is rewritten on each deploy, status comments are appended.
        # If the issue doesn't exist yet we open one. Tolerant of failure
        # so a flaky issue API doesn't fail a healthy deploy.
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_RESULT: ${{ steps.smoke.outputs.result || 'unknown' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST || 'tcgstudio.online' }}
        run: |
          set -e
          SHA_SHORT="$(echo '${{ github.sha }}' | cut -c1-7)"
          NOW="$(date -u '+%Y-%m-%d %H:%M UTC')"
          TITLE="Build status"
          # The body is a Markdown snapshot of the latest deploy. The
          # comments are a per-deploy log entry.
          BODY=$(printf '%s\n' \
            "Single source of truth for the latest deploy. Auto-updated by the **Deploy to GCE VM** workflow." \
            "" \
            "| Field        | Value |" \
            "| ------------ | ----- |" \
            "| Status       | **$DEPLOY_RESULT** |" \
            "| Commit       | [\`$SHA_SHORT\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" \
            "| Workflow run | [#${{ github.run_number }}]($RUN_URL) |" \
            "| Triggered by | @${{ github.actor }} |" \
            "| Public host  | https://$PUBLIC_HOST |" \
            "| Updated      | $NOW |" \
            "" \
            "See the [wiki](${{ github.server_url }}/${{ github.repository }}/wiki/Build-Status) for the full deploy log." \
          )

          # gh issue list returns json; find by exact title. We tag the
          # issue with `build-status` so it's also discoverable by
          # label.
          ISSUE_NUMBER=$(gh issue list --repo "${{ github.repository }}" \
            --state all --search "in:title \"$TITLE\"" \
            --json number,title --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)
          # Ensure the label exists. `|| true` because it 422s when the
          # label is already there.
          gh label create build-status --color BFD4F2 --description "Auto-managed by the deploy workflow." 2>/dev/null || true

          if [ -z "$ISSUE_NUMBER" ]; then
            gh issue create --repo "${{ github.repository }}" \
              --title "$TITLE" --body "$BODY" \
              --label build-status
          else
            gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
              --body "$BODY" --add-label build-status
            gh issue comment "$ISSUE_NUMBER" --repo "${{ github.repository }}" \
              --body "Deploy **$DEPLOY_RESULT** — \`$SHA_SHORT\` · [run #${{ github.run_number }}]($RUN_URL) · $NOW"
            # Keep the issue open while results are unhealthy; close it
            # automatically when the latest deploy is healthy.
            if [ "$DEPLOY_RESULT" = "healthy" ]; then
              gh issue close "$ISSUE_NUMBER" --repo "${{ github.repository }}" --reason completed || true
            else
              gh issue reopen "$ISSUE_NUMBER" --repo "${{ github.repository }}" || true
            fi
          fi

      - name: Attach build-status issue to project
        # Push the build-status issue onto the TCG Studio project board so
        # it's visible alongside the per-task issues. Requires a PAT with
        # `project` scope in PROJECT_TOKEN (the default GITHUB_TOKEN can't
        # touch Projects v2). When the secret isn't set we silently skip.
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PROJECT_OWNER: ${{ secrets.PROJECT_OWNER || 'bloodchild8906' }}
          PROJECT_NUMBER: ${{ secrets.PROJECT_NUMBER }}
        run: |
          if [ -z "$GH_TOKEN" ] || [ -z "$PROJECT_NUMBER" ]; then
            echo "PROJECT_TOKEN / PROJECT_NUMBER not configured — skipping project attach"
            exit 0
          fi
          # Find the build-status issue we just touched.
          ISSUE_URL=$(gh issue list --repo "${{ github.repository }}" \
            --state all --search 'in:title "Build status"' \
            --json url,title --jq ".[] | select(.title==\"Build status\") | .url" | head -n1)
          if [ -z "$ISSUE_URL" ]; then
            echo "build-status issue not found — skipping"
            exit 0
          fi
          gh project item-add "$PROJECT_NUMBER" --owner "$PROJECT_OWNER" --url "$ISSUE_URL" 2>/dev/null || true
          echo "attached $ISSUE_URL to project #$PROJECT_NUMBER"

      - name: Mark job failed if smoke failed
        # Final gate — keeps the GitHub Actions badge red on smoke
        # failure, even though we ran the wiki + issue updates first.
        if: steps.smoke.outputs.result != 'healthy'
        run: |
          echo "smoke test failed — see Build-Status wiki page and issue for details"
          exit 1
